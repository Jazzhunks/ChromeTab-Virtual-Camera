<!DOCTYPE html>
<html lang="en">
  <head>

    <title>Chrome Tab Virtual Camera - Stream Pipeline</title>
    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background-color: #0f172a;
        color: #f1f5f9;

      }

  <body>
